name: Build and publish the oraclelinux8-compat:8-slim compatibility image

# Builds are triggered either by:
#   - a push on the master branch with changes in this file.
#   - a manual trigger of the workflow using the API.
# Images are built for both amd64 and arm64 architectures
# The build-and-push-dev-images workflow will be triggered for the developer
# images based on oraclelinux8-compat:8-slim
on:
  push:
    branches:
      - main
      - workflow
    paths:
      - 'OracleLinuxDevelopers/oraclelinux8/compat/*'
      - '.github/workflows/build-and-push-dev-compat.yml'
  workflow_dispatch:


# Default values for the builds triggered by the push event
env:
  ol: 'oraclelinux7, oraclelinux8'
  lang: 'compat, golang, nodejs, php, python, ruby'

jobs:
  prepare:
    name: Create build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      skip_build: ${{ steps.build-matrix.outputs.skip_build }}
      repository_owner: ${{ steps.repository_owner.outputs.repository_owner }}
      date_stamp: ${{ steps.date_stamp.outputs.date_stamp }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
        with:
          # We need "some" commit history to check for changed files
          fetch-depth: 32

      - name: Build matrix
        id: build-matrix
        working-directory: OracleLinuxDevelopers
        run: |
          ol_list=$(echo "${{ github.event.inputs.ol || env.ol}}" | sed -e 's/[ ,]\+/ /g')
          lang_list=$(echo "${{ github.event.inputs.lang || env.lang}}" | sed -e 's/[ ,]\+/ /g')
          changes=$(mktemp)
          # workflow is only in the workflow_dispatch event payload
          workflow="${{ github.event.workflow }}"
          if [[ -z ${workflow} ]]; then
            # Push event - retrieve list of changed files
            git diff --name-only '${{ github.event.before }}..${{ github.event.after }}' > "${changes}"
            if grep -q build-and-push-dev-images.yml "${changes}"; then
              echo "PUSH: Action updated, rebuilding all images"
              build_all=1
            else
              echo "PUSH: Rebuilding changed images only"
              build_all=0
            fi
          else
            echo "MANUAL: Rebuilding based on parameters"
            build_all=1
          fi
          matrix=$(
            for ol in ${ol_list}; do
            pushd "${ol}" >/dev/null
                for lang in ${lang_list}; do
                pushd "${lang}" >/dev/null
                    for dockerfile in */Dockerfile; do
                      tag=$(dirname "${dockerfile}")
                      arch="linux/amd64"
                      multi=0
                      if [[ ! ${tag} =~ oracledb && ! ( ${ol} = "oraclelinux7" && ${lang} =~ ^(nodejs|php|ruby)$ ) ]]; then
                        arch="${arch},linux/arm64"
                        multi=1
                      fi
                      if [[ ${build_all} -eq 1 ]] || grep -q "${ol}/${lang}/${tag}" "${changes}"; then
                        echo "${ol};${lang};${tag};${arch};${multi}"
                      fi
                    done
                  popd >/dev/null
                done
              popd >/dev/null
            done | jq --slurp --raw-input --compact-output '
              split("\n") |
              .[:-1] |
              map(split(";")) |
              map({"ol": .[0], "lang": .[1], "tag": .[2], "arch": .[3], "multi": (.[4] == "1")})'
          )
          rm "${changes}"
          if [[ ${matrix} == "[]" ]]; then
            # Empty array -- change didn't impact any image
            skip_build=true
          else
            skip_build=false
            matrix=$(jq --compact-output '{ "include": .}' <<<"${matrix}")
          fi
          echo "::set-output name=matrix::${matrix}"
          echo "::set-output name=skip_build::${skip_build}"

  build-image:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: locals
        id: locals
        run: |
          echo "::set-output name=repository_owner::$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "::set-output name=date_stamp::$(date +'%Y%m%d')"
          echo "::set-output name=lang::ruby"

      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image - amd64
        uses: docker/build-push-action@v2
        with:
          context: OracleLinuxDevelopers/oraclelinux8/compat/8-slim
          platforms: linux/amd64
          push: true
          tags: |
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-${{ steps.locals.outputs.date_stamp }}-amd64"
            "ghcr.io/${{ needs.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-amd64"

      - name: Build image - arm64
        uses: docker/build-push-action@v2
        with:
          context: OracleLinuxDevelopers/oraclelinux8/compat/8-slim
          platforms: linux/arm64
          push: true
          tags: |
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-${{ steps.locals.outputs.date_stamp }}-arm64"
            "ghcr.io/${{ needs.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-arm64"

      - name: Manifest
        run: |
          docker buildx imagetools create --tag \
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-${{ steps.locals.outputs.date_stamp }}" \
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-${{ steps.locals.outputs.date_stamp }}-amd64" \
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-${{ steps.locals.outputs.date_stamp }}-arm64"
          docker buildx imagetools create --tag \
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim" \
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-amd64" \
            "ghcr.io/${{ steps.locals.outputs.repository_owner }}/oraclelinux8-compat:8-slim-arm64"

      - name: Trigger dependencies
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Build and publish Oracle Linux developer container images to GitHub Container Registry
          token: ${{ secrets.PERSONAL_TOKEN }}
          inputs: '{ "ol": "oraclelinux8", "lang": "${{ needs.locals.outputs.lang }}" }'
